<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NoReelsInsta MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>NoReelsInsta (MVP)</h1>
      <p class="sub">Manage Instagram without feed/reels distractions.</p>

      <section class="card">
        <h2>1) Connect Instagram</h2>
        <p class="small">Paste your Instagram profile URL and connect.</p>
        <form id="connect-form">
          <label>Instagram profile URL
            <input type="url" id="instagramUrl" required placeholder="https://instagram.com/your_username" />
          </label>
          <div class="actions">
            <button type="submit">Connect with Instagram URL</button>
            <button type="button" id="disconnect-btn">Disconnect</button>
          </div>
        </form>

        <div id="profile-card" class="profile-card hidden">
          <img id="profile-pic" alt="Connected Instagram profile picture" />
          <div>
            <div><strong id="profile-name"></strong></div>
            <div id="profile-username" class="small"></div>
          </div>
        </div>
        <p id="session-text"></p>
      </section>

      <section class="card">
        <h2>2) Draft a post</h2>
        <form id="draft-form">
          <label>Photo (gallery/files)
            <input type="file" id="imageFile" accept="image/*" required />
          </label>
          <label>Caption
            <textarea id="caption" rows="4" maxlength="2200" required></textarea>
          </label>
          <button type="submit">Save draft</button>
        </form>
      </section>

      <section class="card">
        <h2>3) Draft queue</h2>
        <ul id="drafts" class="list"></ul>
      </section>

      <section class="card">
        <h2>4) Published posts (placeholder)</h2>
        <button id="refresh-posts">Refresh published posts</button>
        <ul id="posts" class="list"></ul>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
